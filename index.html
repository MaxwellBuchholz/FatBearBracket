<!DOCTYPE html>
<html>
<head>

</head>
<body>
	<script type="text/javascript" src="bears.js"></script>

	<style>
	.title {
		height: 7em;
	}
	.bracket {
		padding: 0em 5%;
	}
	.two {
		padding: 0em 0em 5em;
	}
	.circle {
		background-color: #EF4D87;
		display: flex;
  		justify-content: center;
  		align-items: center;
		height: auto;
		width: auto;
		padding: 0.5em;
		border-radius: 0.5em;
	}
	.middles {
		padding: 0em 10% 5em;
	}
	.tops {
		padding: 0em 25% 5em;
	}
	.winner {
		position:relative;
		display: flex;
  		justify-content: center;
  		align-items: center;
	}
	</style>

	<div class="title">
		<form>
			<label for="Name">Full Name:</label><br>
			<input type="text" id="Name" name="Name"><br>
		</form>

		<!--Download Button-->
		<button onclick="downloadItems()">Download</button>
	</div>
	<div class="bracket">

		<div class="two">
			<!--Leaves-->
			<div style="float:left;" class="circle">
				<select name="Matchup A" id="MA" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);">
					<option value="">Select Bear</option>
					<option value="Bear1">bear 1</option>
	    				<option value="Bear2">bear 2</option>
				</select>
			</div>
			<div style="float:right;" class="circle">
				<select name="Matchup C" id="MC" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);">
					<option value="">Select Bear</option>
					<option value="Bear5">bear 5</option>
	    				<option value="Bear6">bear 6</option>
				</select>
			</div>
		</div>

		<div class="middles">
			<div style="float:left;" class="circle">
				<script type="text/javascript" language="JavaScript">
					document.write('<select style="float:left;" name="Matchup E" id="ME" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>

			<div style="float:right;" class="circle">
				<script type="text/javascript" language="JavaScript">
		        		document.write('<select style="float:right" name="Matchup G" id="MG" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>
		</div>

		<div class="tops">
			<div class="winner">
				<div class="circle">
					<script type="text/javascript" language="JavaScript">
		        			document.write('<select name="Matchup K" id="MK" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
					</script>
				</div>
			</div>

			<div style="float:left;" class="circle">
				<script type="text/javascript" language="JavaScript">
		        		document.write('<select style="float:left;" name="Matchup I" id="MI" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>

			<div style="float:right;" class="circle">
				<script type="text/javascript" language="JavaScript">
		        		document.write('<select style="float:right;" name="Matchup J" id="MJ" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>

		</div>


		<div class="middles">
			<div style="float:left;" class="circle">
				<script type="text/javascript" language="JavaScript">
					document.write('<select style="float:left;" name="Matchup F" id="MF" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>

			<div style="float:right;" class="circle">
				<script type="text/javascript" language="JavaScript">
					document.write('<select style="float:right" name="Matchup H" id="MH" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);"><option value="">Select Previous Bear</option></select>')
				</script>
			</div>
		</div>


		<div class="two">
				<div style="float:left;" class="circle">
					<select name="Matchup B" id="MB" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);">
						<option value="">Select Bear</option>
						<option value="Bear3">bear 3</option>
	    					<option value="Bear4">bear 4</option>
					</select>
				</div>


				<div style="float:right;" class="circle">
					<select name="Matchup D" id="MD" onchange="javascript: dynamicdropdown(this.options[this.selectedIndex].value);">
						<option value="">Select Bear</option>
						<option value="Bear7">bear 7</option>
	    					<option value="Bear8">bear 8</option>
					</select>
				</div>
		</div>
	</div>

	<script>
	function downloadItems() {

		//Gets text from text areas
		const Name = document.getElementById('Name').value.trim();

		//Gets text from dropdowns
		const dropdowns = [
        		document.getElementById('MA'),
        		document.getElementById('MB'),
        	        document.getElementById('MC'),
        	        document.getElementById('MD'),
        	        document.getElementById('ME'),
        	        document.getElementById('MF'),
        	        document.getElementById('MG'),
        	        document.getElementById('MH'),
        	        document.getElementById('MI'),
        	        document.getElementById('MJ'),
        	        document.getElementById('MK')
            	];

		//Combines texts
		let selectedTexts = [];

		selectedTexts.push(`Name: ${Name}`)
		dropdowns.forEach((dropdown, index) => {
		const selectedText = dropdown.options[dropdown.selectedIndex].text;
			selectedTexts.push(`M${String.fromCharCode(index + 65)}: ${selectedText}`);
		})

		const combinedText = selectedTexts.join('\n')

		//Creates and download file
		const blob = new Blob([combinedText], { type: 'text/plain' });
		const url = URL.createObjectURL(blob);
		const a = document.createElement('a');
		a.href = url;
		a.download = `${Name}.fbb`;
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
